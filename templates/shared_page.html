<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shared Recipes - AyurAahar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Nunito', sans-serif; }
    .brand { font-family: 'Lobster', cursive; }
  </style>
</head> 

<body class="bg-[#FFEBCD] min-h-screen flex flex-col justify-between">
  
  <!-- Main Content Wrapper -->
  <div class="w-full max-w-md md:max-w-2xl lg:max-w-4xl mx-auto px-4 flex-1 pb-20">
    
    <!-- Logo/Header with Back Button -->
    <div class="py-6 flex items-center justify-between md:justify-start">
      <a href="{% url 'profile_view' %}" class="text-[#964B00] hover:text-[#FF9933] transition-colors md:mr-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
        </svg>
      </a>
      <span class="brand text-[#964B00] text-2xl md:text-3xl font-bold">AyurAahar</span>
      <span class="w-6 h-6 md:hidden"></span>
    </div>

    <!-- Page heading -->
    <div class="mb-4">
      <h1 class="text-xl md:text-2xl font-bold text-[#964B00]">Recipes Shared By You</h1>
      <p class="text-sm text-gray-600 mt-1">Thanks for sharing the knowledge with others</p>
    </div>

    <!-- Search Bar -->
    <div class="mb-4">
      <input type="text" placeholder="Search recipes, ingredients..."
        class="w-full px-4 py-2 rounded-xl border border-[#FF9933] bg-white shadow focus:outline-none focus:ring-2 focus:ring-[#FF9933]"/>
    </div> 

    <!-- Recipe Cards -->
    <div class="mb-6"> 
      <h2 class="font-semibold text-[#964B00] mb-2 text-lg">Your Shared Recipes</h2>
      <div class="grid grid-cols-2 md:grid-cols-3 gap-4"> 
        {% for recipe in recipes %}
        <div class="bg-white rounded-xl shadow p-3 flex flex-col items-center relative hover:shadow-lg transition transform hover:scale-105"> 
          <!-- Like Button -->
          <button onclick="toggleHeart(this, {{ recipe.id }})" aria-label="Like" class="absolute top-2 right-2 z-10">
            <i class="heartIcon {% if recipe.is_liked %}fa-solid fa-heart text-red-500{% else %}fa-regular fa-heart text-gray-400{% endif %} text-xl"></i>
          </button>

          <!-- Recipe Image -->
          <img src="{{ recipe.image.url }}" alt="{{ recipe.recipe_name }}"
               class="w-full max-w-[12rem] h-48 border-4 border-[#FF9933] rounded-xl shadow-lg object-cover mb-2 mt-2"/> 

          <!-- Recipe Name -->
          <div class="font-bold text-center">
            {{ recipe.recipe_name }}
          </div>
          <div class="text-xs text-[#964B00]">
            {{ recipe.category_name }}
          </div> 

          <!-- See Recipe Button -->
          <a href="{% url 'recipe_page' recipe.id %}" 
             class="mt-2 px-3 py-2 text-s rounded bg-[#FF9933] text-white font-semibold hover:bg-[#964B00] transition"> 
            See Recipe 
          </a> 
        </div> 
        {% empty %} 
        <p class="col-span-2 md:col-span-3 text-center text-gray-500">No shared recipes yet.</p> 
        {% endfor %} 
      </div> 
    </div>

  </div>

  <!-- Bottom Navigation Bar (sticky) -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-[#FF9933] z-50">
    <div class="max-w-md mx-auto flex justify-between items-center py-2 px-6">
      <!-- Home Icon -->
      <a href="{% url 'home' %}" class="flex flex-col items-center text-[#964B00]">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path d="M3 12L12 3l9 9M4 10v10h16V10"/>
        </svg>
        <span class="text-xs">Home</span>
      </a>
      <!-- Categories Icon -->
      <a href="{% url 'categories' %}" class="flex flex-col items-center text-[#964B00]">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <rect x="4" y="4" width="7" height="7"/><rect x="13" y="4" width="7" height="7"/><rect x="4" y="13" width="7" height="7"/><rect x="13" y="13" width="7" height="7"/>
        </svg>
        <span class="text-xs">Categories</span>
      </a>
      <!-- Liked Icon -->
      <a href="{% url 'liked_recipes' %}" class="flex flex-col items-center text-[#964B00]">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path d="M12 21C12 21 4 13.36 4 8.5a4.5 4.5 0 018.5-2.5A4.5 4.5 0 0120 8.5C20 13.36 12 21 12 21z"/>
        </svg>
        <span class="text-xs">Liked</span>
      </a>
      <!-- Profile Icon -->
      <a href="{% url 'profile_view' %}" class="flex flex-col items-center text-[#964B00]">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <circle cx="12" cy="8" r="4"/><path d="M6 20c0-3.314 2.686-6 6-6s6 2.686 6 6"/>
        </svg>
        <span class="text-xs">Profile</span>
      </a>
    </div>
  </nav>

  <script>
    function toggleHeart(btn, recipeId) {
      fetch(`/recipe/${recipeId}/like/`, {
        method: "POST",
        headers: { "X-CSRFToken": getCookie("csrftoken") },
      })
      .then(response => response.json())
      .then(data => {
        const icon = btn.querySelector('.heartIcon');
        if (data.liked) {
          icon.classList.remove('fa-regular', 'text-gray-400');
          icon.classList.add('fa-solid', 'text-red-500');
        } else {
          icon.classList.remove('fa-solid', 'text-red-500');
          icon.classList.add('fa-regular', 'text-gray-400');
        }
      });
    }

    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i].trim();
          if (cookie.substring(0, name.length + 1) === (name + '=')) {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }
  </script>

</body>


</html>
