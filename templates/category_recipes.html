<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ category.category_name }} Recipes - AyurAahar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Nunito', sans-serif; }
    .brand { font-family: 'Lobster', cursive; }
  </style>
</head>
<body class="bg-[#FFEBCD] min-h-screen flex flex-col">

  <!-- Top bar -->
  <div class="flex items-center justify-between px-4 py-4">
    <a href="{% url 'home' %}" class="text-[#964B00]">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
    </a>
    <span class="brand text-2xl text-[#964B00]">AyurAahar</span>
    <span class="w-6 h-6"></span>
  </div>

  <!-- Page heading -->
  <div class="px-4 mb-6">
    <h1 class="text-xl font-semibold text-[#964B00]">{{ category.category_name }} Recipes</h1>
    <p class="text-sm text-gray-600">Explore all recipes under this category</p>
  </div>

  <!-- Recipe grid -->
  <div class="mb-6 px-4">
    <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
      {% for recipe in recipes %}
      <div class="bg-white rounded-xl shadow p-3 flex flex-col items-center relative hover:shadow-lg transition transform hover:scale-105">
        <img src="{{ recipe.image.url }}" 
             alt="{{ recipe.recipe_name }}"
             class="w-full max-w-[12rem] h-48 border-4 border-[#FF9933] rounded-xl shadow-lg object-cover mb-2 mt-2"/>
        <div class="font-bold text-center">
          {{ recipe.recipe_name }}
        </div>
        <div class="text-xs text-[#964B00]">
          {{ recipe.category_name.category_name }}
        </div>
        <a href="{% url 'recipe_page' recipe.id %}" 
           class="mt-2 px-3 py-2 text-sm rounded bg-[#FF9933] text-white font-semibold hover:bg-[#964B00] transition">
          See Recipe
        </a>
      </div>
      {% empty %}
      <p class="col-span-2 md:col-span-3 text-center text-gray-500">No recipes available yet.</p>
      {% endfor %}
    </div>
  </div>


  
    
   <!-- Bottom Navigation Bar (sticky) -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-[#FF9933] z-50">
    <div class="max-w-md mx-auto flex justify-between items-center py-2 px-6">
      <!-- Home Icon -->
      <a href="{% url 'home' %}" class="flex flex-col items-center text-[#964B00]">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path d="M3 12L12 3l9 9M4 10v10h16V10"/>
        </svg>
        <span class="text-xs">Home</span>
    </a>
      <!-- Categories Icon -->
      <a href="{% url 'categories'%}" class="flex flex-col items-center text-[#964B00]">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <rect x="4" y="4" width="7" height="7"/><rect x="13" y="4" width="7" height="7"/><rect x="4" y="13" width="7" height="7"/><rect x="13" y="13" width="7" height="7"/>
        </svg>
        <span class="text-xs">Categories</span>
    </a>
      <!-- Liked Icon -->
      <a href="{% url 'liked_recipes' %}" class="flex flex-col items-center text-[#964B00]">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path d="M12 21C12 21 4 13.36 4 8.5a4.5 4.5 0 018.5-2.5A4.5 4.5 0 0120 8.5C20 13.36 12 21 12 21z"/>
        </svg>
        <span class="text-xs">Liked</span>
      </a>
      <!-- Profile Icon -->
      <a href="{%url 'profile_view' %}" class="flex flex-col items-center text-[#964B00]">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <circle cx="12" cy="8" r="4"/><path d="M6 20c0-3.314 2.686-6 6-6s6 2.686 6 6"/>
        </svg>
        <span class="text-xs">Profile</span>
      </a>
    </div>
  </nav>
</body>
</html>
