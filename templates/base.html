  <script>
    // Slider Logic
    const messages = [
      "Eat seasonal, eat local. Indian millet dishes fuel your roots and health.",
      "Ayurveda wisdom: Food is medicine. Reconnect with heritage grains for better nutrition.",
      "From festivals to daily meals, our culinary culture blends taste, tradition, and vitality. Discover & share!"
    ];
    let currentSlide = 0;
    const slideContent = document.getElementById('slideContent');
    const dots = document.querySelectorAll('[data-slide]');
    
    function updateSlider() {
      slideContent.textContent = messages[currentSlide];
      dots.forEach((dot, idx) => {
        dot.classList.toggle('opacity-100', idx === currentSlide);
        dot.classList.toggle('opacity-60', idx !== currentSlide);
      });
    }
    dots.forEach((dot, idx) => {
      dot.addEventListener('click', () => {
        currentSlide = idx;
        updateSlider();
      });
    });

    updateSlider();
    setInterval(() => {
      currentSlide = (currentSlide + 1) % messages.length;
      updateSlider();
    }, 4500); // change every 4.5 seconds

    // Heart Icon Logic for all cards
    function toggleHeart(btn) {
      const path = btn.querySelector('.heartPath');
      if (path.classList.contains('stroke-gray-300')) {
        path.classList.remove('stroke-gray-300');
        path.classList.add('stroke-red-500', 'fill-red-500');
      } else {
        path.classList.remove('stroke-red-500', 'fill-red-500');
        path.classList.add('stroke-gray-300');
      }
    }
  </script>
